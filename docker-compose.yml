# =============================================================================
# SolidScheduler — Docker Compose (Self-Hosted)
# =============================================================================
#
# Quick start:
#   cp .env.example .env        # then edit .env
#   docker compose up -d        # builds frontend + backend, starts everything
#
# Logs:   docker compose logs -f
# Stop:   docker compose down
#
# For HTTPS in production, see SELF-HOSTING.md or use the Caddy override:
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
# =============================================================================

services:

  # -- Frontend (React app — builds inside Docker, served by nginx) --
  # By default listens on port 80. When using a reverse proxy (Caddy/nginx),
  # set FRONTEND_PORT=127.0.0.1:3000 in .env to keep it internal-only.
  frontend:
    build:
      context: .
      dockerfile: proton-scheduler-frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: ${BASE_URL:-http://localhost:3001}
    container_name: solidscheduler-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-0.0.0.0:80}:80"
    depends_on:
      - backend
    networks:
      - internal

  # -- Backend (Express API) --
  backend:
    build:
      context: ./proton-scheduler-backend
      args:
        GIT_AUTH_TOKEN: ${GIT_AUTH_TOKEN:-}
    container_name: solidscheduler-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_started
    networks:
      - internal

  # -- Redis (session storage) --
  redis:
    image: redis:7-alpine
    container_name: solidscheduler-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  redis-data:

networks:
  internal:
    driver: bridge
