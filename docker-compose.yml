# =============================================================================
# ProtonScheduler — Docker Compose (Self-Hosted)
# =============================================================================
#
# Start:  docker compose up -d
# Logs:   docker compose logs -f
# Stop:   docker compose down
# =============================================================================

services:

  backend:
    build:
      context: ./proton-scheduler-backend
      args:
        GIT_AUTH_TOKEN: ${GIT_AUTH_TOKEN:-}
    container_name: protonscheduler-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_started
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: protonscheduler-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: protonscheduler-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./proton-scheduler-frontend/dist:/usr/share/nginx/app:ro
    depends_on:
      - backend
    networks:
      - internal

volumes:
  redis-data:

networks:
  internal:
    driver: bridge
