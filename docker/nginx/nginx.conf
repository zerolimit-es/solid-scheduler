# =============================================================================
# SolidScheduler — Nginx HTTPS reverse proxy
# =============================================================================
# Used by docker-compose.nginx.yml as an HTTPS termination layer.
# Replace "your-domain.com" with your actual domain.
#
# For automatic HTTPS without manual cert management, use Caddy instead:
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
# =============================================================================

events {
    worker_connections 1024;
}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:3001;
    }

    # -- ACME challenge + HTTP -> HTTPS redirect --
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -- Main Application (HTTPS) --
    # Update server_name and SSL paths to match your domain
    server {
        listen 443 ssl;
        server_name your-domain.com;

        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:\!aNULL:\!MD5;
        ssl_prefer_server_ciphers on;

        # API — proxy to backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
        }

        # Everything else — proxy to frontend container
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
