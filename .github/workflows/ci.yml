name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Backend
  # ===========================================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: proton-scheduler-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (dry run)
        run: node --check src/server.js

      - name: Run tests
        run: npm test

  # ===========================================================================
  # Frontend
  # ===========================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: proton-scheduler-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: rm package-lock.json && npm install

      - name: Build
        run: npm run build
